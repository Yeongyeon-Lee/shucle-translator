<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>셔클 번역기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563EB;
      --primary-light: #EFF6FF;
      --primary-dark: #1D4ED8;
      --bg: #F8FAFC;
      --card: #ffffff;
      --text: #1E293B;
      --muted: #64748B;
      --border: #E2E8F0;
      --danger: #EF4444;
      --success: #10B981;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .app-header {
      background: white;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }

    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-emoji { font-size: 26px; line-height: 1; }
    .logo-title { font-size: 18px; font-weight: 700; color: var(--primary); letter-spacing: -0.3px; }
    .logo-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }

    .btn-ghost {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      background: white;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .btn-ghost.active { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .api-panel {
      background: #F8FAFF;
      border-bottom: 1px solid var(--border);
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.28s ease, opacity 0.2s ease;
    }
    .api-panel.open { max-height: 220px; opacity: 1; }

    .api-panel-inner {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 24px;
    }

    .api-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .api-desc a { color: var(--primary); text-decoration: none; }
    .api-desc a:hover { text-decoration: underline; }

    .api-settings-row {
      display: flex;
      gap: 8px;
      align-items: center;
      max-width: 640px;
      margin-bottom: 8px;
    }

    .api-settings-row input {
      flex: 1;
      padding: 9px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      background: white;
      color: var(--text);
      transition: border-color 0.15s;
    }
    .api-settings-row input:focus { border-color: var(--primary); }

    .api-settings-row select {
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: white;
      color: var(--text);
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .api-settings-row select:focus { border-color: var(--primary); }

    .btn-primary {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .api-key-status { font-size: 12px; }
    .api-key-status.ok { color: var(--success); }
    .api-key-status.err { color: var(--danger); }

    .main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 28px 24px 60px;
    }

    .api-needed-banner {
      background: #FFFBEB;
      border: 1.5px solid #FDE68A;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 14px;
      color: #92400E;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }
    .api-needed-banner.show { display: flex; }
    .api-needed-banner button {
      margin-left: auto;
      flex-shrink: 0;
      padding: 6px 14px;
      border: 1.5px solid #F59E0B;
      border-radius: 7px;
      background: white;
      color: #92400E;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .api-needed-banner button:hover { background: #FEF3C7; }

    .error-box {
      background: #FEF2F2;
      border: 1.5px solid #FECACA;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 14px;
      color: var(--danger);
      margin-bottom: 20px;
      display: none;
    }
    .error-box.show { display: block; }

    .input-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }

    .input-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .input-label span:first-child { font-size: 14px; font-weight: 700; }
    .char-count { font-size: 12px; color: var(--muted); }

    #korean-input {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      font-size: 15px;
      font-family: inherit;
      line-height: 1.75;
      resize: vertical;
      outline: none;
      color: var(--text);
      background: var(--bg);
      transition: border-color 0.15s, background 0.15s;
      min-height: 120px;
    }
    #korean-input:focus { border-color: var(--primary); background: white; }
    #korean-input::placeholder { color: #CBD5E1; }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 12px;
      gap: 12px;
    }
    .input-hint { font-size: 12px; color: var(--muted); }

    #translate-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      min-width: 130px;
      flex-shrink: 0;
    }
    #translate-btn:hover:not(:disabled) { background: var(--primary-dark); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    #translate-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
      flex-shrink: 0;
    }
    #translate-btn.loading .spinner { display: block; }
    #translate-btn.loading .btn-label { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-header { margin-bottom: 14px; }
    .results-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
    }
    @media (max-width: 1100px) { .results-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 700px)  { .results-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px)  { .results-grid { grid-template-columns: 1fr; } }

    .lang-card {
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow 0.15s, border-color 0.15s;
      display: flex;
      flex-direction: column;
    }
    .lang-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
    .lang-card.has-result { border-color: #BFDBFE; }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      gap: 8px;
    }

    .lang-info { display: flex; align-items: center; gap: 8px; min-width: 0; }
    .lang-flag { font-size: 20px; flex-shrink: 0; line-height: 1; }
    .lang-names { min-width: 0; }
    .lang-name { font-size: 12px; font-weight: 700; color: var(--text); white-space: nowrap; }
    .lang-native { font-size: 11px; color: var(--muted); }

    .copy-btn {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 9px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: white;
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
      white-space: nowrap;
    }
    .copy-btn:hover:not([disabled]) { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }
    .copy-btn.copied { border-color: var(--success); color: var(--success); background: #ECFDF5; }
    .copy-btn[disabled] { opacity: 0.35; cursor: default; }

    .card-body {
      padding: 14px;
      flex: 1;
      min-height: 90px;
      display: flex;
      align-items: flex-start;
    }

    .translation-text {
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .card-empty {
      font-size: 13px;
      color: #CBD5E1;
      align-self: center;
      width: 100%;
      text-align: center;
    }

    .skeleton-wrap { width: 100%; }
    .skeleton-line {
      height: 13px;
      border-radius: 4px;
      background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
      background-size: 300% 100%;
      animation: shimmer 1.4s infinite;
      margin-bottom: 9px;
    }
    .skeleton-line:nth-child(2) { width: 82%; }
    .skeleton-line:nth-child(3) { width: 58%; margin-bottom: 0; }
    @keyframes shimmer {
      0% { background-position: 300% 0; }
      100% { background-position: -300% 0; }
    }

    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(10px);
      background: #1E293B;
      color: white;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 640px) {
      .header-inner { padding: 12px 16px; }
      .main { padding: 20px 16px 60px; }
      .api-panel-inner { padding: 14px 16px; }
      .logo-sub { display: none; }
      .input-footer { flex-direction: column; align-items: flex-end; }
      .api-settings-row { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="logo">
      <span class="logo-emoji">🚌</span>
      <div>
        <div class="logo-title">셔클 번역기</div>
        <div class="logo-sub">셔클 용어를 알고 있는 서비스 전용 번역기</div>
      </div>
    </div>
    <button class="btn-ghost" id="api-key-btn">🔑 API 키 설정</button>
  </div>

  <div class="api-panel" id="api-panel">
    <div class="api-panel-inner">
      <p class="api-desc">
        H Chat Personal API 키를 입력하세요. 키는 브라우저 로컬 스토리지에만 저장되며 외부로 전송되지 않습니다.
        <a href="https://h-chat-platform.autoever.com/personal-key-lists" target="_blank" rel="noopener">키 발급하기 →</a>
      </p>
      <div class="api-settings-row">
        <input type="password" id="api-key-input" placeholder="Personal API Key를 입력하세요" autocomplete="off" spellcheck="false">
        <select id="model-select">
          <option value="claude-sonnet-4-6">Claude Sonnet 4.6 (추천)</option>
          <option value="claude-sonnet-4-5">Claude Sonnet 4.5</option>
          <option value="claude-haiku-4-5">Claude Haiku 4.5 (빠름)</option>
        </select>
        <button class="btn-primary" id="api-key-save">저장</button>
        <button class="btn-ghost" id="api-key-clear" style="display:none">삭제</button>
      </div>
      <div class="api-key-status" id="api-key-status"></div>
    </div>
  </div>
</header>

<main class="main">

  <div class="api-needed-banner" id="api-needed-banner">
    <span>🔑 번역하려면 H Chat Personal API 키가 필요해요.</span>
    <button id="banner-set-key">API 키 설정하기</button>
  </div>

  <div class="error-box" id="error-box"></div>

  <div class="input-card">
    <div class="input-label">
      <span>🇰🇷 한국어 입력</span>
      <span class="char-count" id="char-count">0자</span>
    </div>
    <textarea
      id="korean-input"
      rows="5"
      placeholder="번역할 한국어 텍스트를 입력하세요&#10;&#10;예) 라이더가 호출을 완료했습니다. 드라이버앱에서 배차 현황을 확인해 주세요."
    ></textarea>
    <div class="input-footer">
      <span class="input-hint">셔클 내부 용어(라앱, 드앱, 모서, DRT 등)를 자동으로 인식합니다. · Ctrl+Enter로 번역</span>
      <button id="translate-btn">
        <div class="spinner"></div>
        <span class="btn-label">번역하기</span>
      </button>
    </div>
  </div>

  <div id="results-section">
    <div class="results-header">
      <span class="results-title">번역 결과</span>
    </div>
    <div class="results-grid" id="results-grid"></div>
  </div>

</main>

<div id="toast"></div>

<script>
const HCHAT_BASE = 'https://internal-apigw-kr.hmg-corp.io/hchat-in/api/v3/openai/deployments';

const SHUCLE_TERMS = [
  { term: '라앱', full: '라이더앱', desc: '승객(라이더)이 DRT/택시 등을 호출하는 앱' },
  { term: '드앱', full: '드라이버앱', desc: '기사(드라이버)가 배차를 받고 운행 정보를 확인하는 앱' },
  { term: '비앱', full: '비히클앱', desc: '차량(Vehicle)에 탑재되는 앱' },
  { term: '검수앱', full: '내비 검수앱', desc: '내비게이션 검수 전용 앱' },
  { term: '기사앱', full: '택시기사앱', desc: '택시 기사 전용 앱' },
  { term: '똑타', full: '똑타 (경기도 통합 MaaS 앱)', desc: '경기도에서 운영하는 통합 교통 앱. 셔클 플랫폼 기반' },
  { term: '이응패스', full: '이응패스 (세종시 교통 통합패스)', desc: '세종시에서 운영하는 교통 통합 패스 서비스' },
  { term: '화이트라벨앱', full: '화이트라벨 앱', desc: '지자체·파트너사별로 커스텀 브랜딩해 제공하는 앱' },
  { term: '운영툴', full: '운영 툴 (관제시스템)', desc: 'DRT·택시 서비스를 운영·관리하는 백오피스 웹 툴' },
  { term: '관제툴', full: '관제 툴', desc: '운영툴의 다른 명칭' },
  { term: '관제', full: '관제 툴 / 관제시스템', desc: '운영툴을 가리키는 줄임말' },
  { term: '맵툴', full: '맵 에디터 툴', desc: '서비스 지역, 정류장, 노선 등 지도 데이터를 편집하는 툴' },
  { term: '인사이트툴', full: '인사이트 툴', desc: '운행·이용 데이터를 분석·조회하는 BI 툴' },
  { term: '서포트센터', full: '서포트센터', desc: '고객 문의 대응을 위한 CS 지원 시원 시스템' },
  { term: '모서', full: '모빌리티서비스 (MobilityService)', desc: '배차풀을 공유하며 노선·합승·정류장 이용 여부와 운영 정책을 결정하는 서비스 단위' },
  { term: '택서', full: '택시서비스', desc: '택시 서비스 관련 도메인 줄임말' },
  { term: '서타', full: '서비스타입 (ServiceType)', desc: '서비스 유형을 나타내는 타입 값' },
  { term: '운유타', full: '운행유형타입 (operationType)', desc: '운행유형을 나타내는 타입 값' },
  { term: '성청어', full: '성인+청소년+어린이', desc: '일반석 탑승객 구분 3가지' },
  { term: '원격호출', full: '원격 호출', desc: '운영자(관제)가 라이더를 대신해 발생시키는 호출' },
  { term: '미리호출', full: '미리 호출 (사전 예약)', desc: '탑승 시각 이전에 미리 예약하는 호출 방식' },
  { term: '빠른호출', full: '빠른 호출 (즉시 호출)', desc: '현재 시각 기준 즉시 배차를 요청하는 호출' },
  { term: '전화호출', full: '전화 호출', desc: '앱이 아닌 전화로 차량을 호출하는 방식' },
  { term: '어뷰징', full: '어뷰징 (Abusing)', desc: 'GPS 위치 조작, 허위 탑승 등 서비스 부정 이용 행위' },
  { term: '온고잉', full: '온고잉 (Ongoing)', desc: '라이더앱에서 현재 진행 중인 호출·이용 현황 화면' },
  { term: '알림톡', full: '카카오 알림톡', desc: '카카오톡을 통해 발송하는 서비스 알림' },
  { term: '안심번호', full: '안심번호 (가상 연결번호)', desc: '기사-승객 간 통화 시 실제 번호 대신 사용하는 가상 번호' },
  { term: '선착', full: '선착 (차량 먼저 도착)', desc: '배차된 차량이 라이더보다 먼저 승차 지점에 도착한 상태' },
  { term: '정액형', full: '정액형 페널티', desc: '취소·미탑승 시 고정 금액을 부과하는 페널티 정책' },

function buildSystemPrompt() {
  const termsText = SHUCLE_TERMS
    .map(t => `  - ${t.term} (${t.full}): ${t.desc}`)
    .join('\n');

  return `당신은 셔클(Shucle) 모빌리티 플랫폼 서비스의 전문 번역가입니다.
번역 결과는 검수 없이 바로 서비스에 사용되므로 최고 품질을 보장해야 합니다.

## 번역 원칙
- 직역 금지. 각 언어의 원어민이 자국 모빌리티 서비스를 사용하는 것처럼 자연스럽게 번역
- Uber, Bolt, Grab, FREE NOW 같은 글로벌 모빌리티 서비스의 표현과 UX 패턴을 참고
- 서비스명·브랜드명·고유명사는 원문 그대로 유지 (Shucle, DRT, 똑버스, 이응패스, MaaS 등)
- UI에 사용될 경우 길이를 원문의 120% 이내로 유지
- 변수/플레이스홀더({{variable}}, {0}, %s 등)는 절대 번역하지 말고 그대로 유지

## 언어별 톤 가이드
- 영어(en): 캐주얼하고 직접적. 명령형 허용. 과도한 정중함("Please kindly") 지양. Uber/Lyft 스타일
- 헝가리어(hu): tegezés("te" 비격식) 사용. Bolt·Wolt 등 현대 헝가리 디지털 서비스 톤. magázás("Ön") 금지

고유명사·서비스명(DRT, Shucle, 똑버스 등)은 원문 유지.

${termsText}

function getStoredKey() { return localStorage.getItem('shucle-translator-api-key') || ''; }
function getStoredModel() { return localStorage.getItem('shucle-translator-model') || 'claude-sonnet-4-6'; }

async function callTranslate(text) {
  const apiKey = getStoredKey();
  if (!apiKey) throw new Error('API_KEY_MISSING');

  const model = getStoredModel();
  const endpoint = `${HCHAT_BASE}/${model}/chat/completions`;

  const res = await fetch(endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`,
      'X-Project-Id': '',
    },
    body: JSON.stringify({
      model,
      messages: [
        { role: 'system', content: buildSystemPrompt() },
        { role: 'user', content: `다음 한국어 텍스트를 en, hu, ja, zh_CN, zh_TW 5개 언어로 번역해주세요:\n\n${text}` },
      ],
      max_tokens: 2048,
    }),
  });

  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    const errMsg = err?.error?.message || err?.message || '';
    throw new Error(errMsg || `HTTP ${res.status}`);
  }

  const data = await res.json();
  const raw = data.choices?.[0]?.message?.content || '';

  try {
    return JSON.parse(raw);
  } catch {
    const m = raw.match(/\{[\s\S]*\}/);
    if (m) return JSON.parse(m[0]);
    throw new Error('번역 결과를 파싱할 수 없습니다.');
  }
}

const $ = id => document.getElementById(id);

function esc(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2000);
}

function showError(msg) {
  const b = $('error-box');
  b.textContent = msg;
  b.classList.add('show');
}

function clearError() { $('error-box').classList.remove('show'); }

function renderCards(state) {
  const grid = $('results-grid');
  grid.innerHTML = LANGUAGES.map(lang => {
    let bodyHtml;
    const hasResult = state !== 'empty' && state !== 'loading' && state[lang.code];

    if (state === 'empty') {
      bodyHtml = `<div class="card-empty">—</div>`;
    } else if (state === 'loading') {
      bodyHtml = `<div class="skeleton-wrap">
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
        <div class="skeleton-line"></div>
      </div>`;
    } else {
      const text = state[lang.code] || '';
      bodyHtml = text
        ? `<div class="translation-text">${esc(text)}</div>`
        : `<div class="card-empty">번역 결과 없음</div>`;
    }

    return `
      <div class="lang-card${hasResult ? ' has-result' : ''}" data-lang="${lang.code}">
        <div class="card-header">
          <div class="lang-info">
            <span class="lang-flag">${lang.flag}</span>
            <div class="lang-names">
              <div class="lang-name">${lang.name}</div>
              <div class="lang-native">${lang.native}</div>
            </div>
          </div>
          <button class="copy-btn" data-lang="${lang.code}"${!hasResult ? ' disabled' : ''}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            복사
          </button>
        </div>
        <div class="card-body">${bodyHtml}</div>
      </div>`;
  }).join('');

  grid.querySelectorAll('.copy-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => {
      const lang = btn.dataset.lang;
      const text = grid.querySelector(`.lang-card[data-lang="${lang}"] .translation-text`)?.textContent || '';
      if (!text) return;
      navigator.clipboard.writeText(text).then(() => {
        btn.classList.add('copied');
        btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> 복사됨`;
        showToast('복사되었습니다.');
        setTimeout(() => {
          btn.classList.remove('copied');
          btn.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 복사`;
        }, 2000);
      }).catch(() => showToast('복사 실패'));
    });
  });
}

function updateApiKeyUI() {
  const key = getStoredKey();
  const model = getStoredModel();
  const status = $('api-key-status');
  const clearBtn = $('api-key-clear');
  const banner = $('api-needed-banner');

  $('model-select').value = model;

  if (key) {
    status.className = 'api-key-status ok';
    status.textContent = `✓ API 키가 저장되어 있습니다. 사용 모델: ${model}`;
    clearBtn.style.display = 'inline-flex';
    banner.classList.remove('show');
    $('api-key-input').value = '';
    $('api-key-input').placeholder = '이미 저장됨 — 변경하려면 새 키를 입력하세요';
  } else {
    status.className = 'api-key-status';
    status.textContent = '';
    clearBtn.style.display = 'none';
    banner.classList.add('show');
    $('api-key-input').placeholder = 'Personal API Key를 입력하세요';
  }
}

});

$('api-key-save').addEventListener('click', () => {
  const val = $('api-key-input').value.trim();
  const model = $('model-select').value;
  const status = $('api-key-status');

  // 모델은 항상 저장 (키 변경 없이 모델만 바꿀 수도 있음)
  localStorage.setItem('shucle-translator-model', model);

  const existingKey = getStoredKey();
  if (!val && !existingKey) {
    status.className = 'api-key-status err';
    status.textContent = 'API 키를 입력해주세요.';
    return;
  }
  if (val) {
    localStorage.setItem('shucle-translator-api-key', val);
  }
  updateApiKeyUI();
});

$('api-key-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') $('api-key-save').click();
});

$('api-key-clear').addEventListener('click', () => {
  if (!confirm('저장된 API 키를 삭제할까요?')) return;
  localStorage.removeItem('shucle-translator-api-key');
  updateApiKeyUI();
});

});

$('korean-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') $('translate-btn').click();
});

$('translate-btn').addEventListener('click', async () => {
  const text = $('korean-input').value.trim();
  if (!text) { showError('번역할 텍스트를 입력해주세요.'); return; }

  if (!getStoredKey()) {
    $('api-panel').classList.add('open');
    $('api-key-btn').classList.add('active');
    setTimeout(() => $('api-key-input').focus(), 50);
    return;
  }

  clearError();
  $('translate-btn').disabled = true;
  $('translate-btn').classList.add('loading');
  renderCards('loading');

  try {
    const result = await callTranslate(text);
    renderCards(result);
  } catch (err) {
    const msg = err.message;
    if (msg === 'API_KEY_MISSING') {
      showError('API 키를 먼저 설정해주세요.');
    } else if (msg.includes('401') || msg.toLowerCase().includes('unauthorized')) {
      showError('API 키가 유효하지 않습니다. H Chat에서 키를 다시 발급받아 입력해주세요.');
    } else if (msg.includes('403') || msg.toLowerCase().includes('forbidden')) {
      showError('접근이 거부되었습니다(403). API 키를 다시 확인하거나, 사내망(VPN)에 연결되어 있는지 확인해주세요.');
    } else if (msg.includes('429') || msg.toLowerCase().includes('rate limit')) {
      showError('일일 사용량을 초과했거나 요청이 너무 많습니다. 잠시 후 다시 시도해주세요.');
    } else if (msg.includes('Failed to fetch') || msg.toLowerCase().includes('network') || msg.toLowerCase().includes('cors')) {
      showError('네트워크 오류입니다. 사내망(VPN)에 연결되어 있는지 확인해주세요.');
    } else {
      showError(`번역 오류: ${msg}`);
    }
    renderCards('empty');
  } finally {
    $('translate-btn').disabled = false;
    $('translate-btn').classList.remove('loading');
  }
});

// Init
renderCards('empty');
updateApiKeyUI();
</script>
</body>
</html>
